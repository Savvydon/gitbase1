<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width-device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie-edge">
        <title>Form page</title>
    </head>
    <body>
        <p>
            <form action="">
                <fieldset>
                    <legend>Fill form</legend>
                    <div>
                        <label for="name">Full name:</label>
                        <input type="text" name="name" required placeholder="Enter full name">
                </div>
                <div>
                    <label for="email">Email address:</label>
                    <input type="email" name="email" placeholder="xyz@gmail.com" pattern="donsave@gmail.com" required>
                </div>
                <div>
                    <label for="phone-number">Phone number:</label>
                    <input type="tel" name="phone-number" required>
                </div>
                <div>Gender</div>
                <div>
                    <label for="gender-choice">male</label>
                    <input type="radio" name="gender-choice" value="choice-1">
                </div>
                <div>
                    <label for="gender-choice">female</label>
                    <input type="radio" name="gender-choice" value="choice-2">
                </div>
                <div>
                    <label for="password">Password</label>
                    <input type="password" name="password" required>
                </div>
                <div>
                    <label for="agree">I agree to the conditions in the form</label>
                    <input type="checkbox" name="agree">
                </div>
                <div>
                    <button type="submit">submit</button>
                </div>
                </fieldset>
            </form>
        </p>
        <script type="text/javascript">
            alert("Your submission was successful");
        </script>
    </body>
</html>
